spring.application.name=validation
spring.datasource.url=jdbc:h2:mem:turnovervalidation
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
# Run schema.sql (analytics views) after Hibernate creates the operational tables
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.hibernate.engine.transaction.jta.platform.internal.JtaPlatformInitiator=ERROR
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

# External Tenant App API (API key from env)
tenant-api.base-url=https://tenant-app.example.com
tenant-api.api-key=${TENANT_API_KEY:local-dev-key}
tenant-api.page-size=100
