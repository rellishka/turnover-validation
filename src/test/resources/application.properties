# Test configuration. A same-named application.properties on the test classpath
# fully replaces the main one (Spring Boot does not merge them), so this mirrors
# the main config but deliberately OMITS the demo seed (spring.sql.init.data-locations),
# keeping the test database empty. schema.sql (the analytics view) still loads via
# defer-datasource-initialization, which the view contract test relies on.
spring.application.name=validation
spring.datasource.url=jdbc:h2:mem:turnovervalidation
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# External Tenant App API
tenant-api.base-url=https://tenant-app.example.com
tenant-api.api-key=${TENANT_API_KEY:local-dev-key}
tenant-api.page-size=100
